<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forró do Horizonte - Contato</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sand: '#F6F1E7',
                        gold: '#F2B84B',
                        orange: '#F47A2A',
                        red: '#E33A2D',
                        deep: '#6E1E1B',
                        ink: '#1A1A1A',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Sora', 'sans-serif'],
                    },
                    letterSpacing: {
                        micro: '0.32em',
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        /* Page specific styles */
        .content-scroll {
            height: 100%;
            overflow-y: auto;
            padding-top: 80px; /* Space for nav */
            padding-bottom: 60px;
            scrollbar-width: none; /* Firefox */
        }
        .content-scroll::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative selection:bg-orange selection:text-white">

    <!-- L1 Background Grain -->
    <div class="bg-grain"></div>
    <div class="bg-vignette"></div>

    <!-- Main Container -->
    <main class="relative w-full h-full flex items-center justify-center p-4 md:p-8">
        
        <!-- Poster Frame -->
        <div class="poster-frame relative overflow-hidden bg-sand/50">
            
            <!-- Navigation -->
            <nav class="absolute top-6 left-6 right-6 flex justify-between items-start z-30 pointer-events-auto">
                <a href="index.html" class="micro-text text-left hover:text-orange transition-colors">
                    <div>HOME</div>
                    <div class="mt-1">FORRÓ DO HORIZONTE</div>
                </a>
                <div class="flex gap-8 micro-text text-center">
                    <a href="agenda.html" class="hover:text-orange transition-colors">
                        <div>AGENDA</div>
                        <div class="mt-1">SHOWS</div>
                    </a>
                    <a href="biografia.html" class="hover:text-orange transition-colors">
                        <div>BIO</div>
                        <div class="mt-1">HISTÓRIA</div>
                    </a>
                    <a href="galeria.html" class="hover:text-orange transition-colors">
                        <div>GALERIA</div>
                        <div class="mt-1">FOTOS</div>
                    </a>
                </div>
                <a href="contato.html" class="text-orange font-bold micro-text text-right">
                    <div>CONTATO</div>
                    <div class="mt-1">FALE CONOSCO</div>
                </a>
            </nav>

            <!-- L5 Sun Circle (Background) -->
            <div class="sun-wrap" style="opacity: 0.2; transform: translateX(-50%) translateY(20%);">
                <div class="sun-gradient"></div>
            </div>

            <!-- Content Area -->
            <div class="content-scroll px-6 md:px-12 relative z-20 flex flex-col items-center justify-center">
                <h1 class="font-display font-bold text-4xl md:text-5xl text-ink mb-8 text-center slide-up">CONTRATAR SHOW</h1>
                
                <form class="w-full max-w-lg space-y-4 slide-up delay-100">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="flex flex-col gap-1">
                            <label for="name" class="font-sans text-xs uppercase tracking-wider text-ink/60">Nome</label>
                            <input type="text" id="name" class="bg-sand border-b border-ink/20 p-2 focus:border-orange outline-none transition-colors font-sans text-ink placeholder-ink/30" placeholder="Seu nome">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label for="email" class="font-sans text-xs uppercase tracking-wider text-ink/60">Email</label>
                            <input type="email" id="email" class="bg-sand border-b border-ink/20 p-2 focus:border-orange outline-none transition-colors font-sans text-ink placeholder-ink/30" placeholder="seu@email.com">
                        </div>
                    </div>
                    
                    <div class="flex flex-col gap-1">
                        <label for="subject" class="font-sans text-xs uppercase tracking-wider text-ink/60">Assunto</label>
                        <select id="subject" class="bg-sand border-b border-ink/20 p-2 focus:border-orange outline-none transition-colors font-sans text-ink">
                            <option>Contratar Show</option>
                            <option>Imprensa</option>
                            <option>Parceria</option>
                            <option>Outro</option>
                        </select>
                    </div>

                    <div class="flex flex-col gap-1">
                        <label for="message" class="font-sans text-xs uppercase tracking-wider text-ink/60">Mensagem</label>
                        <textarea id="message" rows="4" class="bg-sand border-b border-ink/20 p-2 focus:border-orange outline-none transition-colors font-sans text-ink placeholder-ink/30 resize-none" placeholder="Detalhes do evento, data, local..."></textarea>
                    </div>

                    <button type="submit" class="w-full bg-ink text-white font-sans font-bold uppercase tracking-wide py-4 mt-4 hover:bg-orange transition-colors">
                        Enviar Mensagem
                    </button>
                </form>

                <div class="mt-12 text-center slide-up delay-200">
                    <p class="font-sans text-ink/60 text-sm mb-2">OU FALE DIRETAMENTE:</p>
                    <a href="mailto:contato@forrodohorizonte.com.br" class="block font-display font-bold text-xl text-ink hover:text-orange transition-colors">contato@forrodohorizonte.com.br</a>
                    <p class="font-sans text-ink mt-2">(11) 99999-9999</p>
                </div>
            </div>

            <!-- Decorative Bottom Bar -->
            <div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-24 h-1 bg-ink/10 rounded-full z-30"></div>

        </div>
    </main>

</body>
</html>
