<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forró do Horizonte - Home</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sand: '#F6F1E7',
                        gold: '#F2B84B',
                        orange: '#F47A2A',
                        red: '#E33A2D',
                        deep: '#6E1E1B',
                        ink: '#1A1A1A',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Sora', 'sans-serif'],
                    },
                    letterSpacing: {
                        micro: '0.32em',
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="flex items-center justify-center min-h-screen relative selection:bg-orange selection:text-white">

    <!-- L1 Background Grain -->
    <div class="bg-grain"></div>
    <div class="bg-vignette"></div>

    <!-- Main Container -->
    <main class="relative w-full h-full flex items-center justify-center p-4 md:p-8">
        
        <!-- Poster Frame -->
        <div class="poster-frame relative overflow-hidden bg-sand/50">
            
            <!-- L3 Microtexts Top -->
            <div class="absolute top-6 left-6 right-6 flex justify-between items-start z-30 pointer-events-none">
                <div class="micro-text text-left">
                    <div>SLKR // DESIGN_EDITION</div>
                    <div class="mt-1">UNFOCUS</div>
                </div>
                <div class="micro-text text-center">
                    <div>NOL6_v2</div>
                    <div class="mt-1">SOFTEN</div>
                </div>
                <div class="micro-text text-right">
                    <div>230717</div>
                    <div class="mt-1">UNCLEAR</div>
                </div>
            </div>

            <!-- L4 Dots Left -->
            <div class="absolute left-6 top-1/2 -translate-y-1/2 flex flex-col gap-3 z-30 pointer-events-none">
                <div class="w-1.5 h-1.5 rounded-full border border-ink opacity-40"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-orange"></div>
                <div class="w-1.5 h-1.5 rounded-full border border-ink opacity-40"></div>
                <div class="w-1.5 h-1.5 rounded-full border border-ink opacity-40"></div>
            </div>

            <!-- L5 Sun Circle -->
            <!-- 
                TODO: Dynamic Circle Behavior
                O círculo irá ter um comportamento dinâmico, que irá verificar a hora local.
                - Se for de dia (entre 06:00 e 18:00): o posicionamento ficará mais baixo.
                - Se for noite (entre 18:00 e 00:00): alterar para uma "Lua".
                - Se for madrugada (restante): posicionar bem mais abaixo, como sol nascente.
            -->
            <div class="sun-wrap">
                <div class="sun-gradient"></div>
            </div>

            <!-- L6 Band Photo -->
            <div class="band-photo-container">
                <img src="assets/images/band.png" alt="Forró do Horizonte" class="band-photo">
                <div class="band-photo-overlay"></div>
            </div>

            <!-- L7 Blur Band -->
            <!-- 
            <div class="blur-band-container">
                <div class="blur-band band-a"></div>
                <div class="blur-band band-b"></div>
            </div>
            -->

            <!-- L9 Copy Plate (Fog) -->
            <div class="hero-copy-plate"></div>

            <!-- L9 Content -->
            <div class="hero-content px-6">
                <div class="hero-title-wrapper">
                    <!-- Back Title (Filled) -->
                    <h1 class="hero-title font-display font-extrabold text-5xl md:text-7xl lg:text-8xl text-ink mb-2 slide-up">
                        FORRÓ DO<br>HORIZONTE
                    </h1>
                    
                    <!-- Front Title (Outline) -->
                    <h1 class="hero-title-outline font-display font-extrabold text-5xl md:text-7xl lg:text-8xl mb-2 slide-up" aria-hidden="true">
                        FORRÓ DO<br>HORIZONTE
                    </h1>
                </div>

                <p class="hero-subtitle font-sans text-lg md:text-xl text-ink/80 mb-8 max-w-lg mx-auto slide-up delay-100">
                    Forró pé-de-serra com energia moderna.
                </p>
                
                <div class="hero-buttons flex flex-col sm:flex-row items-center justify-center gap-4 slide-up delay-200">
                    <!-- Primary Button -->
                    <a href="#" class="group relative px-8 py-3 rounded-full overflow-hidden transition-transform hover:scale-105 active:scale-95">
                        <div class="absolute inset-0 bg-gradient-to-r from-gold via-orange to-red opacity-90 group-hover:opacity-100 transition-opacity"></div>
                        <div class="absolute inset-0 bg-white/20 blur-lg opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <span class="relative font-sans font-semibold text-white text-sm tracking-wide uppercase">Ver fotos dos eventos</span>
                    </a>
                    
                    <!-- Secondary Button -->
                    <a href="#" class="group px-8 py-3 rounded-full border border-ink/30 hover:border-ink hover:bg-ink/5 transition-all active:scale-95">
                        <span class="font-sans font-medium text-ink text-sm tracking-wide uppercase">Contratar Show</span>
                    </a>
                </div>
            </div>

            <!-- L8 Editorial Texts Bottom -->
            <div class="absolute bottom-6 left-6 right-6 flex justify-between items-end z-30 pointer-events-none border-t border-ink/10 pt-4">
                <div class="micro-text text-left w-24">BLIND / BLUR.</div>
                <div class="micro-text text-center flex-1 hidden sm:block">O SOM QUE NASCE NO HORIZONTE</div>
                <div class="micro-text text-right w-24">FADE AWAY © 2024</div>
            </div>

            <!-- Decorative Bottom Bar -->
            <div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-24 h-1 bg-ink/10 rounded-full z-30"></div>

        </div>
    </main>

</body>
</html>
